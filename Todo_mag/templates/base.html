{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block Title %}{% endblock Title %}</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            background: linear-gradient(135deg,#0f172a,#1e293b,#334155);
            color:white;
            overflow-x:hidden;
        }

        /* NAVBAR */

        .navbar{
            width:100%;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px 8%;
            position:fixed;
            top:0;
            left:0;
            z-index:1000;
            backdrop-filter:blur(10px);
            background:rgba(255,255,255,0.08);
        }

        .logo{
            font-size:2rem;
            font-weight:700;
            color:#38bdf8;
            animation:slideLeft 1s ease;
        }

        .nav-links{
            display:flex;
            gap:30px;
            list-style:none;
        }

        .nav-links li a{
            text-decoration:none;
            color:white;
            font-size:1rem;
            transition:0.3s;
        }

        .nav-links li a:hover{
            color:#38bdf8;
        }

        /* MOBILE MENU */

        .menu-toggle{
            display:none;
            font-size:2rem;
            cursor:pointer;
        }

        /* HERO SECTION */

        .hero{
            width:100%;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:120px 20px 50px;
            position:relative;
        }

        .hero-content{
            z-index:10;
            animation:fadeUp 1.5s ease;
        }

        .title{
            font-size:4rem;
            margin-bottom:20px;
            line-height:1.2;
        }

        .title span{
            color:#38bdf8;
            text-shadow:0 0 20px rgba(56,189,248,0.8);
        }

        .subtitle{
            font-size:1.2rem;
            max-width:700px;
            margin:auto;
            opacity:0.9;
            margin-bottom:30px;
        }

        .btn{
            padding:14px 35px;
            border:none;
            border-radius:40px;
            background:#38bdf8;
            color:white;
            font-size:1rem;
            cursor:pointer;
            transition:0.4s;
            box-shadow:0 0 20px rgba(56,189,248,0.5);
        }

        .btn:hover{
            transform:translateY(-5px) scale(1.05);
            background:#0ea5e9;
        }

        /* FLOATING SHAPES */

        .floating-circle{
            position:absolute;
            border-radius:50%;
            background:rgba(56,189,248,0.15);
            animation:float 6s infinite ease-in-out;
        }

        .circle1{
            width:250px;
            height:250px;
            top:10%;
            left:5%;
        }

        .circle2{
            width:180px;
            height:180px;
            bottom:10%;
            right:10%;
            animation-delay:2s;
        }

        .circle3{
            width:120px;
            height:120px;
            top:60%;
            left:50%;
            animation-delay:4s;
        }

        /* ANIMATIONS */

        @keyframes float{
            0%{
                transform:translateY(0px);
            }
            50%{
                transform:translateY(-25px);
            }
            100%{
                transform:translateY(0px);
            }
        }

        @keyframes fadeUp{
            from{
                opacity:0;
                transform:translateY(50px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @keyframes slideLeft{
            from{
                opacity:0;
                transform:translateX(-50px);
            }
            to{
                opacity:1;
                transform:translateX(0);
            }
        }

        /* RESPONSIVE DESIGN */

        @media(max-width:768px){

            .title{
                font-size:2.5rem;
            }

            .subtitle{
                font-size:1rem;
            }

            .menu-toggle{
                display:block;
            }

            .nav-links{
                position:absolute;
                top:80px;
                right:-100%;
                width:220px;
                flex-direction:column;
                background:rgba(15,23,42,0.95);
                padding:20px;
                border-radius:10px;
                transition:0.4s;
            }

            .nav-links.active{
                right:20px;
            }
        }

        .logo-container{
            display:flex;
            align-items:center;
            gap:10px;
        }

        .logo-img{
            width:45px;
            height:45px;
            border-radius:50%;
            object-fit:cover;
            box-shadow:0 0 10px rgba(56,189,248,0.5);
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar">
        <div class="logo-container">
            <img src="{% static "images/todo.jpg" %}" alt="Logo" class="logo-img">
            <div class="logo">TodoManager</div>
        </div>

        <ul class="nav-links" id="navLinks">
            <li><a href="{% url 'homepage' %}">Home</a></li>
            <li><a href="{% url 'aboutpage' %}">About</a></li>
            <li><a href="{% url 'todolistpage' %}">todolist</a></li>
            <li><a href="{% url 'contactpage' %}">Contact</a></li>
        </ul>

        <div class="menu-toggle" id="menuToggle">
            ☰
        </div>
    </nav>

    <!-- HERO SECTION -->

    <section class="hero">

        {% block content %}{% endblock content %}

    </section>

    <script>
        // MOBILE MENU

        const menuToggle = document.getElementById("menuToggle");
        const navLinks = document.getElementById("navLinks");

        menuToggle.addEventListener("click", () => {
            navLinks.classList.toggle("active");
        });

        
    </script>

</body>
</html>
